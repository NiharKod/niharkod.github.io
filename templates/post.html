<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} - Writing - Nihar Kodkani</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../assets/prism/prism.min.css" />
    <link rel="stylesheet" href="../assets/prism/plugins/line-numbers/prism-line-numbers.min.css" />
    <script src="../assets/prism/prism.min.js" defer></script>
    <script src="../assets/prism/plugins/line-numbers/prism-line-numbers.min.js" defer></script>
    <script src="../assets/prism/plugins/autoloader/prism-autoloader.min.js" defer></script>
    <script>
      window.Prism = window.Prism || {};
      Prism.plugins = Prism.plugins || {};
      Prism.plugins.autoloader = Prism.plugins.autoloader || {};
      Prism.plugins.autoloader.languages_path = "../assets/prism/components/";
    </script>
    <script>
      (function () {
        function markLanguages() {
          document.querySelectorAll("pre > code").forEach(function (block) {
            var hasLanguage = Array.from(block.classList).some(function (className) {
              return className && className.indexOf("language-") === 0;
            });
            if (!hasLanguage) {
              block.classList.add("language-c");
            }
            if (block.parentElement && block.parentElement.tagName.toLowerCase() === "pre") {
              block.parentElement.classList.add("line-numbers");
            }
          });
        }

        function tryHighlight() {
          if (window.Prism && typeof Prism.highlightAll === "function") {
            Prism.highlightAll();
            return true;
          }
          return false;
        }

        function readyAndHighlight() {
          markLanguages();
          if (!tryHighlight()) {
            var attempts = 0;
            var id = setInterval(function () {
              attempts += 1;
              if (tryHighlight() || attempts > 40) {
                clearInterval(id);
              }
            }, 50);
          }
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", readyAndHighlight);
        } else {
          readyAndHighlight();
        }
      })();
    </script>
  </head>
  <body>
    <div class="layout">
      <div class="page-shell">
        <nav aria-label="Primary">
          <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="../writing.html">Writing</a></li>
            <li><a href="../reading_list.html">Reading List</a></li>
            <li><a href="https://scholar.google.com/citations?user=4ha1PB4AAAAJ&hl=en">Research</a></li>
            <li><a href="https://github.com/NiharKod">GitHub</a></li>
          </ul>
        </nav>

        <main>
          <h1>{{ title }}</h1>
          {% if date %}
          <p class="post-date">{{ date }}</p>
          {% endif %}

          {{ content | safe }}
        </main>
      </div>
    </div>
  </body>
</html>
